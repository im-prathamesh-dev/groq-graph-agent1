version: '3.8'

services:
  # MongoDB NoSQL Database
  mongodb:
    image: mongo:latest
    container_name: mern_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - mern_network

  # Qdrant Vector Store Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: mern_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - mern_network

  # Local Ollama AI Engine
  ollama:
    image: ollama/ollama:latest
    container_name: mern_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - mern_network

  # MERN API Backend Node Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mern_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/ai-resume-analyzer
      - JWT_SECRET=super_secret_jwt_key_resume_analyzer_123!
      - JWT_EXPIRES_IN=7d
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - EMBEDDING_MODEL=nomic-embed-text
      - LLM_MODEL=llama3
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongodb
      - qdrant
      - ollama
    networks:
      - mern_network

  # Vite + React Frontend Interface Client
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mern_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - mern_network

volumes:
  mongo_data:
  qdrant_data:
  ollama_data:

networks:
  mern_network:
    driver: bridge
